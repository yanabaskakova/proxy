services:
  prebuilt-upstream:
    build: .
    image: openclaw-prebuilt-upstream:latest
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      STREAM_DELAY_MS: ${STREAM_DELAY_MS:-30000}
      STREAM_INITIAL_DELAY_MS: ${STREAM_INITIAL_DELAY_MS:-0}
      STREAM_CHUNK_SIZE: ${STREAM_CHUNK_SIZE:-100}
      REPLAY_DT_MIN_MS: ${REPLAY_DT_MIN_MS:-0}
      STREAM_DELAY_MS_BY_MODEL: ${STREAM_DELAY_MS_BY_MODEL:-}
      STREAM_INITIAL_DELAY_MS_BY_MODEL: ${STREAM_INITIAL_DELAY_MS_BY_MODEL:-}
      STREAM_CHUNK_SIZE_BY_MODEL: ${STREAM_CHUNK_SIZE_BY_MODEL:-}
      DEFAULT_RESPONSE: ${DEFAULT_RESPONSE:-No matching response found.}
      RESPONSES_FILE: /app/new-responses.json.gz
      RESPONSES_FILES_BY_MODEL: ${RESPONSES_FILES_BY_MODEL:-{"vanilla":"/app/new-vanilla-responses.json.gz","eagle-oss":"/app/new-gpt-oss-eagle-responses.json.gz","gpt-oss":"/app/new-gpt-oss-eagle-responses.json.gz","cerebras":"/app/new-cerebras-responses.json.gz","groq":"/app/new-groq-responses.json.gz"}}
      LOG_REQUESTS: ${LOG_REQUESTS:-true}
    volumes:
      # Mount the rules files so edits hot-reload without rebuilding the image.
      - ./new-responses.json.gz:/app/new-responses.json.gz:ro
      - ./new-vanilla-responses.json.gz:/app/new-vanilla-responses.json.gz:ro
      - ./new-gpt-oss-eagle-responses.json.gz:/app/new-gpt-oss-eagle-responses.json.gz:ro
      - ./new-cerebras-responses.json.gz:/app/new-cerebras-responses.json.gz:ro
      - ./new-groq-responses.json.gz:/app/new-groq-responses.json.gz:ro
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
